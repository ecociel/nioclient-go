name: Check protobuf
run-name: Check protopub file is in sync with original
on:
  push:
    branches:
      - main

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # iam.proto is maintained to match the nio server (ecociel/nio), which may
      # be private; sessions still pin to the public nio-client export.
      - name: Fail if proto/sessions.proto differs from upstream
        run: |
          curl -fsSL https://raw.githubusercontent.com/ecociel/nio-client/refs/heads/main/proto/sessions.proto \
            | cmp -s proto/sessions.proto - || \
            (echo "Error: proto/sessions.proto does not match upstream!" && exit 1)

